name: pipeline · build heatmaps

# Reprocessa heatmaps quando uma nova planilha entra em data/raw/
# ou o pipeline Python é atualizado. Commita os artefatos de volta
# no repositório (shared/*), prontos para o web e o mobile.

on:
  push:
    paths:
      - "data/raw/**.xlsx"
      - "pipeline/**"
      - ".github/workflows/pipeline.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"     # toda segunda 06:00 UTC

jobs:
  build-heatmaps:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        run: python scripts/run_pipeline.py --force

      - name: Run tests
        run: |
          pip install pytest
          pytest -q

      - name: Commit generated artifacts
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name  "saifen-bot"
          git config user.email "saifen-bot@users.noreply.github.com"
          git add shared/
          if git diff --staged --quiet; then
            echo "Nenhuma mudança nos heatmaps."
          else
            git commit -m "chore(shared): rebuild heatmaps $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shared-${{ github.sha }}
          path: shared/
          retention-days: 30
